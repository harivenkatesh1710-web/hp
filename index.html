<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#ffffff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    color:#b30000;
    margin-bottom:25px;
    font-size:22px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}
</style>

</head>
<body>

<div class="login-box">

    <img src="apec(2).jpeg" alt="College Logo" class="logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <form>
        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
